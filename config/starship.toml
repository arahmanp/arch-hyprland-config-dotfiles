# Starship prompt — Catppuccin Mocha
add_newline = true

format = """
[](mauve)\
$os\
$username\
[](bg:surface1 fg:mauve)\
$directory\
[](fg:surface1 bg:surface0)\
$git_branch\
$git_status\
[](fg:surface0 bg:base)\
$nodejs$python$rust$golang$c\
[ ](fg:base)\
$line_break\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
mauve     = "#cba6f7"
red       = "#f38ba8"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
base      = "#1e1e2e"
surface0  = "#313244"
surface1  = "#45475a"

[os]
disabled = false
style = "bg:mauve fg:base"
[os.symbols]
Arch = "󰣇 "
Linux = " "

[username]
show_always = true
style_user = "bg:mauve fg:base"
style_root = "bg:red fg:base"
format = '[ $user ]($style)'

[directory]
style = "bg:surface1 fg:text"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Pictures"  = " "
"Projects"  = " "

[git_branch]
symbol = ""
style = "bg:surface0 fg:green"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:surface0 fg:peach"
format = '[$all_status$ahead_behind ]($style)'

[nodejs]
symbol = ""
style = "bg:base fg:green"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:base fg:yellow"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:base fg:peach"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:base fg:teal"
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = "bg:base fg:blue"
format = '[ $symbol ($version) ]($style)'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"
