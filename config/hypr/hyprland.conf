# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Hyprland — main configuration                                            ║
# ║  This file only sources the modular parts below. Edit the files in        ║
# ║  ~/.config/hypr/conf/ to customise your setup. Wiki: https://wiki.hypr.land║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  Format note: this is the classic "hyprlang" (.conf) format. Hyprland     ║
# ║  0.55 introduced a Lua format and will phase hyprlang out over a few      ║
# ║  releases. Because no ~/.config/hypr/hyprland.lua exists, Hyprland loads   ║
# ║  THIS file normally. To migrate later, see the README ("Lua migration").  ║
# ╚══════════════════════════════════════════════════════════════════════════╝

source = ~/.config/hypr/conf/env.conf
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/looknfeel.conf
source = ~/.config/hypr/conf/input.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/conf/windowrules.conf
source = ~/.config/hypr/conf/keybinds.conf

# Drop personal overrides in ~/.config/hypr/conf/custom.conf (created if you want).
# It is sourced last so it wins over everything above. Uncomment to enable:
# source = ~/.config/hypr/conf/custom.conf
