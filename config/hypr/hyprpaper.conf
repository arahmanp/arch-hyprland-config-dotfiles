# hyprpaper — wallpaper daemon.
# The actual wallpaper is applied by ~/.config/hypr/scripts/wallpaper.sh
# (a random image from ~/Pictures/Wallpapers on login; SUPER+SHIFT+W cycles).
ipc = on
splash = false

# Prefer to pin a specific wallpaper instead of random? Uncomment & edit:
#   preload = ~/Pictures/Wallpapers/01-mocha-mauve.png
#   wallpaper = , ~/Pictures/Wallpapers/01-mocha-mauve.png
