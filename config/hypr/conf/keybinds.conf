# ─────────────────────────── Keybindings ───────────────────────────────────
# Press SUPER + F1 for an in-session cheat-sheet of all of these.

$mainMod = SUPER
$term    = kitty
$files   = thunar
$browser = firefox
$menu    = fuzzel
$scripts = ~/.config/hypr/scripts

# ── Applications & launchers ────────────────────────────────────────────────
bind = $mainMod, Return,    exec, $term
bind = $mainMod, Q,         killactive,
bind = $mainMod, E,         exec, $files
bind = $mainMod, B,         exec, $browser
bind = $mainMod, D,         exec, $menu
bind = $mainMod, SPACE,     exec, $menu
bind = $mainMod, V,         exec, $scripts/clipboard.sh
bind = $mainMod, L,         exec, hyprlock
bind = $mainMod, N,         exec, swaync-client -t -sw
bind = $mainMod, F1,        exec, $scripts/cheatsheet.sh
bind = $mainMod SHIFT, E,   exec, $scripts/powermenu.sh
bind = $mainMod SHIFT, W,   exec, $scripts/wallpaper.sh random
bind = $mainMod SHIFT, R,   exec, hyprctl reload && notify-send -i preferences-desktop "Hyprland" "Configuration reloaded"

# ── Window management ───────────────────────────────────────────────────────
bind = $mainMod, F,         fullscreen, 0
bind = $mainMod SHIFT, F,   fullscreen, 1
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod, P,         pseudo,
bind = $mainMod, J,         togglesplit,
bind = $mainMod, G,         togglegroup,
bind = $mainMod, C,         centerwindow,

# ── Focus (arrow keys) ──────────────────────────────────────────────────────
bind = $mainMod, left,      movefocus, l
bind = $mainMod, right,     movefocus, r
bind = $mainMod, up,        movefocus, u
bind = $mainMod, down,      movefocus, d

# ── Move window (SUPER + SHIFT + arrows) ────────────────────────────────────
bind = $mainMod SHIFT, left,   movewindow, l
bind = $mainMod SHIFT, right,  movewindow, r
bind = $mainMod SHIFT, up,     movewindow, u
bind = $mainMod SHIFT, down,   movewindow, d

# ── Resize window (SUPER + CTRL + arrows) ───────────────────────────────────
binde = $mainMod CTRL, left,   resizeactive, -40 0
binde = $mainMod CTRL, right,  resizeactive,  40 0
binde = $mainMod CTRL, up,     resizeactive,  0 -40
binde = $mainMod CTRL, down,   resizeactive,  0  40

# ── Workspaces (1–10) ───────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace (SUPER + SHIFT + number).
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Cycle workspaces with the mouse wheel / brackets.
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1
bind = $mainMod, period,     workspace, e+1
bind = $mainMod, comma,      workspace, e-1

# ── Scratchpad (special workspace) ──────────────────────────────────────────
bind = $mainMod, S,        togglespecialworkspace, magic
bind = $mainMod SHIFT, S,  movetoworkspace, special:magic

# ── Mouse: move/resize floating windows with SUPER + drag ───────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Screenshots (grim + slurp + swappy) ─────────────────────────────────────
bind = , Print,            exec, $scripts/screenshot.sh region
bind = SHIFT, Print,       exec, $scripts/screenshot.sh swappy
bind = $mainMod, Print,    exec, $scripts/screenshot.sh full

# ── Audio (with on-screen display via swayosd) ──────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle
# Same controls without media keys (SUPER + +/-).
bindel = $mainMod, equal,  exec, swayosd-client --output-volume raise
bindel = $mainMod, minus,  exec, swayosd-client --output-volume lower

# ── Brightness (with on-screen display) ─────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ── Media player control ────────────────────────────────────────────────────
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
