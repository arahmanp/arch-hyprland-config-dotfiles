# ───────────────────────────── Autostart ───────────────────────────────────
# Order matters: import the session env first so portals / user services work
# (screen-sharing, file pickers, polkit, etc.).

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE

# Polkit agent (graphical password prompts for admin actions).
exec-once = systemctl --user start hyprpolkitagent

# Wallpaper daemon + set a (random) wallpaper.
exec-once = hyprpaper
exec-once = ~/.config/hypr/scripts/wallpaper.sh random

# Bar, notifications, idle daemon, on-screen-display server.
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = swayosd-server

# Tray applets: network + bluetooth.
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Clipboard history (text + images) → queried with SUPER+V.
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Secret store (Wi-Fi passwords, app credentials).
exec-once = gnome-keyring-daemon --start --components=secrets

# Make sure the cursor theme is applied to the Hyprland namespace too.
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
