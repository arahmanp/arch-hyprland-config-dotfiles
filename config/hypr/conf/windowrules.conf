# ─────────────────────────── Window rules ──────────────────────────────────

# --- Float common dialogs & utility windows ---
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(org.pulseaudio.pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(nwg-look)$
windowrule = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float, class:^(file-roller|org.gnome.FileRoller)$
windowrule = float, class:^(imv|mpv)$
windowrule = float, class:^(galculator|org.gnome.Calculator)$
windowrule = float, title:^(Open File|Open Files|Save As|Save File|Choose Files|All Files)$

# Center every floating window.
windowrule = center, floating:1

# --- Picture-in-Picture: floating, pinned, sized, parked bottom-right ---
windowrule = float,            title:^(Picture-in-Picture)$
windowrule = pin,              title:^(Picture-in-Picture)$
windowrule = keepaspectratio,  title:^(Picture-in-Picture)$
windowrule = size 30% 30%,     title:^(Picture-in-Picture)$
windowrule = move 68% 67%,     title:^(Picture-in-Picture)$

# --- Light transparency for a couple of apps (looks great with blur) ---
windowrule = opacity 0.93 0.90, class:^(kitty)$
windowrule = opacity 0.97 0.93, class:^(thunar|Thunar)$

# --- Keep the screen awake while any window is fullscreen (videos/games) ---
windowrule = idleinhibit fullscreen, class:.*

# --- No rounding while a single window is fully tiled-fullscreen ---
windowrule = rounding 0, fullscreen:1

# ─────────────────────────── Layer rules ───────────────────────────────────
# Blur the bar, launcher, notifications and logout overlay.
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = blur, launcher
layerrule = ignorezero, launcher
layerrule = blur, logout_dialog
