# ─────────────────────────── Look & feel ───────────────────────────────────
# Catppuccin Mocha accents, rounded corners, blur, smooth animations.
# Tuned to look great while staying light enough for an Intel iGPU.

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    # Active border: mauve → blue gradient. Inactive: muted surface.
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(31324488)

    resize_on_border = true
    hover_icon_on_border = true
    allow_tearing = false           # keep false on iGPU unless you game competitively
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.97
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
        popups = true
        popups_ignorealpha = 0.2
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(11111baa)
        offset = 0 4
    }

    dim_inactive = false
    dim_strength = 0.1
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_resize = true
    smart_split = false
}

master {
    new_status = master
    new_on_top = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true                       # variable refresh-rate: big power saver on iGPU
    vrr = 0                          # set 1 (or 2) only if your monitor supports VRR
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = false
    enable_swallow = false
    new_window_takes_over_fullscreen = 2
}

# Subtle resize feedback when grabbing window borders.
binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
}
