# ────────────────────────────── Monitors ───────────────────────────────────
# Default rule: detect every output, use its preferred mode, auto-place, scale 1.
# This "just works" for laptops and single/most multi-monitor desktops.
monitor = , preferred, auto, 1

# To customise: run  `hyprctl monitors all`  to see names/modes, then add lines:
#   monitor = eDP-1,    1920x1080@60,  0x0,    1
#   monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1
#
# HiDPI scaling (sharp): use integer scale 2, or a clean fractional scale:
#   monitor = eDP-1, 2560x1600@60, 0x0, 1.6
#
# Mirror an external to the laptop:
#   monitor = HDMI-A-1, preferred, auto, 1, mirror, eDP-1
#
# Turn an output off:
#   monitor = HDMI-A-1, disable
