# ──────────────────────────────── Input ────────────────────────────────────
input {
    kb_layout = us
    # kb_variant =
    # kb_options = grp:alt_shift_toggle   # uncomment + add a second layout above
    numlock_by_default = true
    repeat_rate = 40
    repeat_delay = 350

    follow_mouse = 1
    sensitivity = 0          # mouse accel: -1.0 .. 1.0 (0 = libinput default)
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.4
    }
}

# Three-finger swipe to move between workspaces (laptops).
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 350
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
}
