# ───────────────────────────── Environment ─────────────────────────────────
# Session identity (portals, screen-sharing and many apps key off these).
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Toolkits → prefer Wayland, fall back to X11/XWayland.
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = _JAVA_AWT_WM_NONREPARENTING,1

# Cursor (theme + size). Bibata is installed by default; size scales with HiDPI.
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# Intel iGPU: VA-API hardware video acceleration via intel-media-driver (iHD).
# (Broadwell/5th-gen and newer. If you have a very old Intel GPU, change to i965.)
env = LIBVA_DRIVER_NAME,iHD
