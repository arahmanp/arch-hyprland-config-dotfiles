# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  hyprlock — lock screen (Catppuccin Mocha)                                ║
# ║  Blurs whatever is on screen at lock time, with a big clock + date.       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

general {
    hide_cursor = true
    grace = 0
    ignore_empty_input = true
    immediate_render = true
}

background {
    monitor =
    path = screenshot          # blur the current screen (no wallpaper file needed)
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Big clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cdd6f4ff)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 260
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(11111baa)
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(b4befeff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# Avatar / user glyph
label {
    monitor =
    text =     $USER
    color = rgba(cdd6f4ff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    rounding = 16
    outer_color = rgba(cba6f7ee)
    inner_color = rgba(1e1e2ecc)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##a6adc8">   Enter password</span>
    hide_input = false
    check_color = rgba(a6e3a1ee)
    fail_color = rgba(f38ba8ee)
    fail_text = <i>$FAIL  (attempt $ATTEMPTS)</i>
    position = 0, -40
    halign = center
    valign = center
}

# Footer hint
label {
    monitor =
    text =   Locked · press Enter after typing your password
    color = rgba(6c7086ff)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = bottom
}
