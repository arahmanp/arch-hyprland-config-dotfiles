# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  hypridle — idle management                                               ║
# ║  Dim → lock → screen off → suspend, with sane laptop-friendly timings.    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

general {
    lock_cmd = pidof hyprlock || hyprlock          # avoid spawning multiple locks
    before_sleep_cmd = loginctl lock-session        # lock just before sleeping
    after_sleep_cmd = hyprctl dispatch dpms on       # wake the display on resume
    ignore_dbus_inhibit = false                      # respect "keep awake" requests
}

# 1) Dim the backlight after 5 min (laptops). Harmless on desktops.
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# 2) Lock after 5.5 min.
listener {
    timeout = 330
    on-timeout = loginctl lock-session
}

# 3) Turn the screen off after 6 min.
listener {
    timeout = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 4) Suspend after 20 min.
#    Desktop user? Comment this whole block out to never auto-suspend.
listener {
    timeout = 1200
    on-timeout = systemctl suspend
}
